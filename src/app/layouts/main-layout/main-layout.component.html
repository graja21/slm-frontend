<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <i class="bi bi-cpu"></i>
      </div>
      <div>
        <h4>SLM AI</h4>
        <span>Local Intelligence</span>
      </div>
    </div>

    <nav class="nav-menu">
      <a routerLink="/dashboard" routerLinkActive="active">
        <i class="bi bi-grid-1x2"></i>
        Dashboard
      </a>

      <a routerLink="/classification" routerLinkActive="active">
        <i class="bi bi-diagram-3"></i>
        Classification
      </a>

      <a routerLink="/analysis/summarization" routerLinkActive="active">
  <i class="bi bi-text-paragraph"></i>
  Summarization
</a>

<a routerLink="/analysis/financial-pdf" routerLinkActive="active">
  <i class="bi bi-filetype-pdf"></i>
  Financial PDF
</a>    

      <a routerLink="/history" routerLinkActive="active">
        <i class="bi bi-clock-history"></i>
        History
      </a>

      <a routerLink="/profile" routerLinkActive="active">
        <i class="bi bi-person"></i>
        Profile
      </a>
    </nav>

    <div class="sidebar-card">
      <i class="bi bi-stars"></i>
      <p>Powered by local SLM models through Ollama.</p>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div>
        <span class="page-label">Workspace</span>
        <strong>AI Analysis Platform</strong>
      </div>

      <button class="logout-btn" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>

      </button>

    <main class="content">
      <router-outlet></router-outlet>
